# =============================================================================
# Deploy แดชบอร์ดสาธิต (dashboard/) ขึ้น GitHub Pages อัตโนมัติ
# -----------------------------------------------------------------------------
# configure-pages (enablement: true) จะเปิด Pages ให้เองผ่าน API
# *** ไม่ใส่ environment gate เพื่อให้ job เริ่มได้แม้ Pages ยังไม่ถูกตั้งใน Settings ***
# จากนั้นทุกครั้งที่ push แตะไฟล์ใน dashboard/ บน main จะ deploy ใหม่ให้เอง
# URL ที่ได้: https://<owner>.github.io/<repo>/
# =============================================================================
name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (เปิด Pages อัตโนมัติถ้ายังไม่ได้เปิด)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload dashboard/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
