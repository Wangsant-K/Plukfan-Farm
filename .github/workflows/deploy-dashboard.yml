# =============================================================================
# Deploy แดชบอร์ดสาธิต (dashboard/) ขึ้น GitHub Pages อัตโนมัติ
# -----------------------------------------------------------------------------
# ต้องตั้ง Settings → Pages → Source = "GitHub Actions" ก่อน (ทำครั้งเดียว)
# จากนั้นทุกครั้งที่ push แตะไฟล์ใน dashboard/ บน main จะ deploy ใหม่ให้เอง
# URL ที่ได้: https://<owner>.github.io/<repo>/
# =============================================================================
name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
